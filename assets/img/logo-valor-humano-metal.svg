<svg xmlns="http://www.w3.org/2000/svg" width="780" height="190" viewBox="0 0 780 190" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Valor Humano</title>
  <desc id="logoDesc">Wordmark metalizado de Valor Humano.</desc>
  <defs>
    <linearGradient id="plate" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fefefe"/>
      <stop offset="18%" stop-color="#ced6de"/>
      <stop offset="40%" stop-color="#8a97a7"/>
      <stop offset="58%" stop-color="#fefefe"/>
      <stop offset="78%" stop-color="#677486"/>
      <stop offset="100%" stop-color="#f5f8fb"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff5cf"/>
      <stop offset="28%" stop-color="#e0c37c"/>
      <stop offset="56%" stop-color="#b98434"/>
      <stop offset="100%" stop-color="#f3e5c0"/>
    </linearGradient>
    <linearGradient id="ink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#293240"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#05070a" flood-opacity="0.26"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <rect x="12" y="18" width="132" height="154" rx="38" fill="url(#ink)" stroke="rgba(255,255,255,0.18)"/>
    <rect x="18" y="24" width="120" height="142" rx="34" fill="none" stroke="url(#plate)" stroke-opacity="0.34"/>
    <path d="M45 54 L77 138 L109 54" fill="none" stroke="url(#gold)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M58 83 H96" fill="none" stroke="url(#plate)" stroke-width="9" stroke-linecap="round"/>
    <path d="M77 54 V138" fill="none" stroke="url(#plate)" stroke-width="7" stroke-linecap="round"/>
  </g>
  <g fill="none">
    <path d="M176 58 H748" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <path d="M176 136 H748" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  </g>
  <text x="178" y="90" fill="url(#plate)" font-family="Cormorant Garamond, Georgia, serif" font-size="64" font-weight="600" letter-spacing="-2.4">
