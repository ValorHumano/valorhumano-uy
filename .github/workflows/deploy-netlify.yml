name: Deploy Netlify

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: netlify-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install function dependencies
        run: npm install

      - name: Check Netlify deploy secrets
        id: netlify-secrets
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${NETLIFY_AUTH_TOKEN}" && -n "${NETLIFY_SITE_ID}" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "Netlify deploy secrets detected."
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Netlify deploy skipped: configure NETLIFY_AUTH_TOKEN and NETLIFY_SITE_ID as GitHub Actions secrets to publish from this workflow."
          fi
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Deploy to Netlify
        if: steps.netlify-secrets.outputs.ready == 'true'
        run: npx netlify-cli@latest deploy --dir=. --functions netlify/functions --prod --message "GitHub Actions ${GITHUB_SHA}" --site "$NETLIFY_SITE_ID" --auth "$NETLIFY_AUTH_TOKEN"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
