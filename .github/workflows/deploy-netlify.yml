name: Deploy Netlify

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: netlify-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install function dependencies
        run: npm install

      - name: Validate Netlify secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          [[ -z "${NETLIFY_AUTH_TOKEN}" ]] && missing+=("NETLIFY_AUTH_TOKEN")
          [[ -z "${NETLIFY_SITE_ID}" ]] && missing+=("NETLIFY_SITE_ID")

          if (( ${#missing[@]} > 0 )); then
            echo "Faltan secrets requeridos para publicar Netlify: ${missing[*]}" >&2
            exit 1
          fi
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Deploy to Netlify
        run: npx netlify-cli@latest deploy --dir=. --functions netlify/functions --prod --message "GitHub Actions ${GITHUB_SHA}" --site "$NETLIFY_SITE_ID" --auth "$NETLIFY_AUTH_TOKEN"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
