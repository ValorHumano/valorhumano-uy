name: Deploy Netlify

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ secrets.NETLIFY_AUTH_TOKEN != '' && secrets.NETLIFY_SITE_ID != '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy to Netlify
        run: npx netlify-cli deploy --dir=. --functions netlify/functions --prod --site "$NETLIFY_SITE_ID" --auth "$NETLIFY_AUTH_TOKEN"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          VH_FORWARD_CONTACT: ${{ secrets.VH_FORWARD_CONTACT }}
          VH_FORWARD_JOBS: ${{ secrets.VH_FORWARD_JOBS }}
          VH_WHATSAPP_NUMBER: ${{ secrets.VH_WHATSAPP_NUMBER }}
