<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#F4F1EB" />
  <title>WhatsApp | Valor Humano</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f1eb;
      --panel: rgba(255, 255, 255, 0.92);
      --text: #23303a;
      --muted: #5f6a75;
      --line: rgba(96, 107, 118, 0.14);
      --gold: linear-gradient(135deg, #fff7e7 0%, #e8d2a4 18%, #c79c57 52%, #edd9ad 80%, #fffdf7 100%);
      --shadow: 0 20px 50px rgba(77, 88, 99, 0.12);
      --radius: 28px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Manrope, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(210, 216, 223, 0.52), transparent 24%),
        radial-gradient(circle at left 10%, rgba(231, 216, 187, 0.48), transparent 22%),
        linear-gradient(180deg, #f4f1eb 0%, #efebe4 100%);
    }

    main {
      width: min(100%, 560px);
      padding: 32px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(2.1rem, 4vw, 2.9rem);
      line-height: 1;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 22px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 14px 22px;
      border-radius: 999px;
      font-weight: 800;
      text-decoration: none;
      border: 1px solid rgba(96, 107, 118, 0.14);
      cursor: pointer;
      font: inherit;
    }

    .btn-primary {
      background: var(--gold);
      color: #2f281d;
      box-shadow: 0 12px 28px rgba(178, 138, 73, 0.18);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.7);
      color: var(--text);
    }
  </style>
</head>
<body>
  <main>
    <h1>Canal directo de Valor Humano.</h1>
    <p id="status">Estamos preparando la apertura del canal oficial de WhatsApp.</p>
    <div class="actions">
      <a id="continue-link" class="btn btn-primary" href="../contacto/">Ir a contacto</a>
      <button id="copy-email" class="btn btn-secondary" type="button">Copiar correo visible</button>
    </div>
  </main>

  <script>
    (function () {
      const publicEmail = "contacto@valorhumano.com.uy";
      const params = new URLSearchParams(window.location.search);
      const text = params.get("text") || "Hola Valor Humano, quiero hacer una consulta.";
      const status = document.getElementById("status");
      const continueLink = document.getElementById("continue-link");
      const copyButton = document.getElementById("copy-email");
      const isLocal = window.location.hostname === "127.0.0.1" || window.location.hostname === "localhost";
      const isGitHubPages = window.location.hostname.endsWith("github.io");
      const repoSlug = isGitHubPages ? (window.location.pathname.split("/").filter(Boolean)[0] || "") : "";
      const siteBasePath = isGitHubPages && repoSlug ? `/${repoSlug}/` : "/";
      const backendOrigin = isLocal
        ? "http://127.0.0.1:8888"
        : window.location.hostname.endsWith("netlify.app")
          ? window.location.origin
          : "https://valorhumano.netlify.app";
      const target = new URL("/api/whatsapp", backendOrigin);

      target.searchParams.set("text", text);

      if (continueLink) {
        continueLink.href = new URL("contacto/", `${window.location.origin}${siteBasePath}`).toString();
      }

      if (copyButton) {
        copyButton.addEventListener("click", async function () {
          try {
            await navigator.clipboard.writeText(publicEmail);
            copyButton.textContent = "Correo copiado";
          } catch (error) {
            copyButton.textContent = publicEmail;
          }

          window.setTimeout(function () {
            copyButton.textContent = "Copiar correo visible";
          }, 1800);
        });
      }

      fetch(target.toString(), {
        method: "OPTIONS",
        mode: "cors",
        headers: {
          Accept: "application/json"
        }
      })
        .then(function (response) {
          if (!response.ok) throw new Error("unavailable");
          if (status) {
            status.textContent = "Te estamos redirigiendo a WhatsApp para continuar la conversación desde el acceso oficial.";
          }
          window.location.replace(target.toString());
        })
        .catch(function () {
          if (status) {
            status.textContent = "El acceso instantáneo de WhatsApp todavía no está disponible en este entorno. Podés continuar por el correo institucional o desde la página de contacto.";
          }
        });
    })();
  </script>
</body>
</html>
